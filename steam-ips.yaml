  #########################################################################
  # STEAM / VALVE / DOTA 2 — OFFICIAL CURRENT IPv4 PREFIXES (AS32590)
  # Источник: текущие публичные BGP-анонсы Valve AS32590.
  #
  # Рекомендуемое использование:
  #   - в DIRECT, чтобы Steam / Dota 2 / SDR не ходили через прокси
  #
  # Если появятся проблемы со Steam Store / Community / логином:
  #   1) сначала закомментируй весь блок 155.133.x.x
  #   2) потом, если нужно, блок 162.254.x.x
  #   3) и только потом legacy/optional блоки ниже
  #
  # Причина:
  #   - это самые "широкие" и чувствительные семейства для Valve/Steam-трафика.
  #   - это практический приоритет отключения, а не официальный маппинг Valve.
  #########################################################################

  #########################################################################
  # GROUP A — 155.133.x.x
  # Самый крупный и чувствительный пул Valve/SDR.
  # Если что-то ломается в экосистеме Steam — ПЕРВЫМ делом комментируй именно этот блок.
  #########################################################################
  - 155.133.224.0/24
  - 155.133.225.0/24
  - 155.133.226.0/24
  - 155.133.227.0/24
  - 155.133.228.0/24
  - 155.133.229.0/24
  - 155.133.230.0/24

  - 155.133.236.0/23
  - 155.133.238.0/24
  - 155.133.239.0/24
  - 155.133.240.0/23

  - 155.133.244.0/24
  - 155.133.246.0/24

  - 155.133.248.0/24
  - 155.133.249.0/24
  - 155.133.250.0/24
  - 155.133.251.0/24
  - 155.133.252.0/24
  - 155.133.254.0/24
  - 155.133.255.0/24

  #########################################################################
  # GROUP B — 162.254.x.x
  # Старый и очень типичный Valve/Steam диапазон.
  # Если после отключения 155.133.x.x проблемы остаются — комментируй этот блок следующим.
  #########################################################################
  - 162.254.192.0/24
  - 162.254.193.0/24
  - 162.254.194.0/24
  - 162.254.195.0/24
  - 162.254.196.0/24
  - 162.254.197.0/24
  - 162.254.198.0/24
  - 162.254.199.0/24

  #########################################################################
  # GROUP C — Legacy/core Valve families
  # Обычно безопасно оставлять, но при странных проблемах со Steam-экосистемой
  # можно временно отключать по одному блоку.
  #########################################################################
  - 208.64.200.0/24
  - 208.64.201.0/24
  - 208.64.202.0/24
  - 208.64.203.0/24

  - 208.78.164.0/22

  - 192.69.96.0/22
  - 205.196.6.0/24

  #########################################################################
  # GROUP D — APAC / regional Valve families
  # Эти блоки полезны для Dota 2 / Steam в Азии и Океании.
  # Если проблема только в Store/Community, обычно их трогают уже после A/B/C.
  #########################################################################
  - 45.121.184.0/24

  - 103.10.124.0/24
  - 103.10.125.0/24
  - 103.28.54.0/24

  #########################################################################
  # GROUP E — Additional regional families
  #########################################################################
  - 146.66.152.0/24
  - 146.66.155.0/24

  - 185.25.182.0/24
  - 185.25.183.0/24

  #########################################################################
  # OPTIONAL / LEGACY / COMMUNITY-FOUND
  #
  # Ниже адреса, которые встречаются в community-списках или старых подборках,
  # но они НЕ подтверждаются как текущие IPv4-префиксы Valve AS32590
  # в публичном списке HE так же явно, как блоки выше.
  #
  # Их имеет смысл включать ТОЛЬКО если:
  #   - часть Steam/Dota все еще уходит не туда
  #   - и ты осознанно хочешь более агрессивный DIRECT
  #
  # Если будут проблемы — отключать эти блоки нужно РАНЬШЕ official-групп,
  # потому что они самые спорные.
  #########################################################################

  # - 103.28.55.0/24   # legacy/community, не держал бы включенным по умолчанию
  # - 153.254.86.0/24  # community-only, в current AS32590 official v4 list не опирался бы на него
  # - 192.64.174.0/23  # спорный/исторический, лучше не включать без реальной необходимости

  #########################################################################
  # OPTIONAL WIDE AGGREGATES (НЕ рекомендую держать активными вместе с detailed list)
  #
  # Это только для быстрого "захвата всего" при диагностике.
  # Если раскомментируешь их, то detailed /24 выше становятся избыточны.
  #########################################################################

